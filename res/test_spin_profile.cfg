# AUTOTESTING CONFIGURATION FILE

#---------------------------------------------------------------------------
# Project related configuration options
#---------------------------------------------------------------------------

[Project]

# The ProjectName is used to give the name to the output files.

ProjectName: SpinProfile

Notes: Test

# The ProjectPath specifies where the framework is supposed to find
# its relevant resources. Throughout the framework the paths are relative
# to this location.

ProjectPath: ./

# Select the testing algorithm to execute.
# The following algorithms are currently supported:
# --> SPEED_TORQUE
# --> SPEED_TORQUE_RISING
# --> OPTIMAL_TR_TUNING
# --> POWER_PROFILE
# --> CURRENT_PROFILE
# --> SPIN_PROFILE

TestAlgo: SPIN_PROFILE

# The FW ELF File Path is specified in this parameter.
# The full absolute path is recommended. 

ElfPath: ./res/Windy_Strip_Cim.out

#---------------------------------------------------------------------------
# Board related configuration options
#---------------------------------------------------------------------------

[Board]

# The BoardName is used to specify the board used for the test.
# The following boards are currently supported:
# --> ILLYRIA
# --> ARCADIA3
# --> WINDY
# --> WINDY_BPM
# --> WINDY_BPM_DTC
# --> WINDY_BPM_DTC_H27
# --> WEBER2

BoardName: WINDY_CIM

BoardConfigFilePath: ./res/board_mapping.cfg
#---------------------------------------------------------------------------
# Instruments related configuration options
#---------------------------------------------------------------------------

[Instruments]

# Instruments used by the InstrumentEngine are defined here, as a comma
# separated list. 
# The following instruments are currently supported:
# --> DSP6000
# --> WT3000
# --> WT2030
# --> IT106A
# --> NIUSB921X
# --> NICOMPACTDAQ
# --> WT500
# --> WT1806

Instruments: DSP6000, WT2030, IT106A

InstrumentDriverConfigFile: ./res/instruments.cfg

#---------------------------------------------------------------------------
# Engines related configuration options
#---------------------------------------------------------------------------

[Engines]

# Engines are used to control the testbench
# The following engines are currently supported:
# --> MASTER_COMMANDER
# --> AIDA_TCPIP
# --> MANUAL_CONTROL
# --> WIN_API
# --> PYVISA

Engines: PYVISA, AIDA_TCPIP

BoardControl: AIDA_TCPIP

BoardAcquisition: AIDA_TCPIP

InstrumentsControl: PYVISA

InstrumentsAcquisition: PYVISA

#---------------------------------------------------------------------------
# Output files configuration
#---------------------------------------------------------------------------

[OutputFiles]

# Set this option to True to retain the engine raw acquisition files.
# Useful for debug.

RetainEngineAcquisitions: True

# Set this option to True to write to file the test log. The file will be
# written in the chosen output directory.

LogToFile: True

# Set the debug level for the file and console logging here.
# It can be one of the following: DEBUG, INFO, WARNING, ERROR

LogLevel: DEBUG

# The Directory for the output files (report, configuration, ...) is specified
# here.

OutputDir: ./out

#---------------------------------------------------------------------------
# MASTER_COMMANDER engine specific configuration
#---------------------------------------------------------------------------

[MASTER_COMMANDER]

# The variables to read / write are specified in APFX profile files. These
# files can be created using the AIDA Profile Editor. Each engine needs its
# profile files. The BoardEngineApfx assigns the APFX file related to the 
# Board engine. This file is required only if the Board engine is enabled.


BoardEngineTracksDef: ./res/windy_variables.yaml

# This parameter specifies the acquisition rate of the engine.
# Unit measure [s]

SamplePeriod: 0.5

# Set this to True in order to create a text file at the end of the 
# acquisition. Set this to False only if you know what you are doing!

WriteToFile: True

# The acquisition file name is specified here. It is recommended to leave
# this option as is.

AcquisitionFileName: ./out/MasterCommanderAcquisition

# Specify here the COMPORT number. This has to be equal to the Windows COM 
# number minus 1. i.e. if you have COM4 you have to write here 3 (4 - 1).

SerialPort: COM18

# The serial BaudRate is specified here. This requires that the board UART
# is configured properly.

SerialBaud: 38400

# This is an internal configuration that specifies how much time the Python
# serial library has to wait for a received character on the buffer. It is
# safe to leave at 0.2.
# Unit measure [s]

SerialTimeout: 0.2

# The architecture of the MCU used is specified here.
# The following MCU architectures are currently supported:
# --> RENESAS_RX62T
# --> FREESCALE_DSC
# --> FREESCALE_KV3X

SerialArch: FREESCALE_KV3X

# MasterCommander serial buffer size. This parameter has to match the 
# corresponding value specified in the FW of the MCU.

ComBufferSize: 35


#---------------------------------------------------------------------------
# AIDA_TCPIP engine specific configuration
#---------------------------------------------------------------------------

[AIDA_TCPIP]

# The path to the Aida DLL is specified in the DllPath variable.

DllPath: ./res/TcpIpToolsInterfaceDynDLL.dll

# The IP Address of the PC which runs AIDA has to be specified here. If
# AIDA is running on the same PC which runs the Autotesting put the 
# localhost 127.0.0.1 IP address.

IpAddress: 127.0.0.1

# Port for the TCP IP communication is specified here. You can find the value
# in the server settings of AIDA.

Port: 51999

# Specify the Transmission Ratio to be used when a Board Acquisition engine
# is not used in the test

TransmissionRatio: 11.73

#---------------------------------------------------------------------------
# PYVISA engine specific configuration
#---------------------------------------------------------------------------

[PYVISA]

# supported tracks to read are the following:
# - torque
# - speed
# - line_voltage
# - line_current
# - 
Tracks: speed, torque, motor_current, motor_voltage, motor_power, line_voltage, line_current, line_power

AcquisitionFilePath: ./out/PyVisaAcquisition

SampleRate: 0.2

#---------------------------------------------------------------------------
# Spin Profile Testing Configuration
#---------------------------------------------------------------------------

[SpinProfile]

# Speed profile used to perform the test.
# Unit measure [rpm_M]

Speed: 500, 500

# Target power values to be reached.
# You can specify one or more values.
# Multiple values have to be comma separated.
# Unit measure [W]

Power: 150, 200

# Time to ramp to the corresponding target power and speed
# Specify one value for each specified power value.
# Multiple values have to be comma separated.
# Unit measure [W]

TRamp: 10, 10

# Steady state time for the corresponding target power.
# Specify one value for each specified power value.
# Multiple values have to be comma separated.
# Unit measure [s]

TSpin: 10, 10

PlateauControllerK0: 1.0e-2

PlateauControllerKi: 5.0e-3

RampControllerK0: 0.1

RampControllerKi: 1.0e-3

ControlStepDelay: 0.5

# Power controller lower limit.
# Unit measure [Nm or %]

ControllerTorqueMin: 0

# Power controller upper limit.
# Unit measure [Nm or %]

ControllerTorqueMax: 1.0

MaxAcceleration: 500

MinimumSpeed: 50

InitialSpeed: 500

OpenLoopTorqueCommand: False

# Choose if motor heating should occur before test execution.
# See the [HeatingAlgo] section in order to configure the heating
# algorithm parameters.

EnableHeating: False

#---------------------------------------------------------------------------
# Heating Algorithm Configuration
#---------------------------------------------------------------------------

[HeatingAlgo]

# Speed value used to execute the motor heating.
# Unit measure [rpm_M]

Speed: 50

Acceleration: 50

# Torque value used to heat the motor.
# Unit measure [Nm]

Torque: 28

# Torque Step value to pass from the initial (zero) value to the
# Torque value.
# Unit measure [Nm]

TorqueStep: 5

# Time to pass from one applied torque value to the next one.
# Unit measure [s]

TorqueStepTime: 1

# Target temperature for the motor.
# Unit measure [Celsius degrees]

TargetTemperature: 80.0

# Timeout value for the heating.
# At the end of this maximum time, if the temperature is not
# reached, the method will exit throwing a warning message.
# Unit measure [s]

Timeout: 1800

#---------------------------------------------------------------------------
# Torque Offset calculation Configuration
#---------------------------------------------------------------------------

[TorqueOffsetAlgo]

# Speed value used to measure the testbench torque offset.
# Unit measure [rpm_M]

Speed: 500

# Time to wait before starting the acquisition.
# Unit measure [s]

SteadyTime: 10

# Acquisition time.
# Unit measure [s]

AcquisitionTime: 10

#---------------------------------------------------------------------------
# De-magnetization Configuration
#---------------------------------------------------------------------------

[Demagnetization]

# Speed value used to apply the de-magnetization of the bench
# Unit measure [rpm_M]

Speed: 500

Acceleration: 500

# Torque value applied.
# Unit measure [Nm]

Torque: 0.2

# Duration of the torque pulse.
# Unit measure [s]

PulseDuration: 2.0

#---------------------------------------------------------------------------
# Parameter Sweep Configuration
#---------------------------------------------------------------------------

[ParamSweep]

# Set to True to enable parameter sweep for the selected test algorithm.

IsEnabled: False

# Track name used as parameter for the sweep.
# This has to be a valid FW variable.

TrackName: Set_File_Params.IsdrefMax

# Minimum value for the parameter sweep.

MinValue: 2.2

# Maximum value for the parameter sweep.

MaxValue: 2.4

# Number of steps to pass from MinValue to MaxValue.
# This will be the number of the selected test algorithm runs.

Steps: 2

# If True, will apply a conversion formula to the specified MinValue
# and MaxValue before writing them to the variable.

ToBeConverted: True

# Conversion formula to apply to the specified MinValue
# and MaxValue before writing them to the variable.
# This is valid only if ToBeConverted is set to True.

ConversionFormula: x / 8.42 * 32768