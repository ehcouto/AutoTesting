# Power controller lower limit.
# Unit measure [Nm or %]

ControllerTorqueMin: 0.0

# Power controller upper limit.
# Unit measure [Nm or %]

ControllerTorqueMax: 1.3

MaxAcceleration: 500

MinimumSpeed: 750

InitialSpeed: 1000

OpenLoopTorqueCommand: False

# Choose if motor heating should occur before test execution.
# See the [HeatingAlgo] section in order to configure the heating
# algorithm parameters.

EnableHeating: True

WaitEndTime: 1

#---------------------------------------------------------------------------
# Heating Algorithm Configuration
#---------------------------------------------------------------------------

[HeatingAlgo]

# Speed value used to execute the motor heating.
# Unit measure [rpm_M]

Speed: 700

Acceleration: 500

# Torque value used to heat the motor.
# Unit measure [Nm]

Torque: 0.9


# Torque Step value to pass from the initial (zero) value to the
# Torque value.
# Unit measure [Nm]

TorqueStep: 0.1

# Time to pass from one applied torque value to the next one.
# Unit measure [s]

TorqueStepTime: 1

TemperatureTrack: IGBT2

ActivationTemperature: 130.0

# Target temperature for the motor.
# Unit measure [Celsius degrees]

TargetTemperature: 130.0

# Timeout value for the heating.
# At the end of this maximum time, if the temperature is not
# reached, the method will exit throwing a warning message.
# Unit measure [s]

Timeout: 3600

#---------------------------------------------------------------------------
# Torque Offset calculation Configuration
#---------------------------------------------------------------------------

[TorqueOffsetAlgo]

# Speed value used to measure the testbench torque offset.
# Unit measure [rpm_M]

Speed: 500

# Time to wait before starting the acquisition.
# Unit measure [s]

SteadyTime: 10

# Acquisition time.
# Unit measure [s]

AcquisitionTime: 10

#---------------------------------------------------------------------------
# De-magnetization Configuration
#---------------------------------------------------------------------------

[Demagnetization]

# Speed value used to apply the de-magnetization of the bench
# Unit measure [rpm_M]

Speed: 1000

Acceleration: 500

# Torque value applied.
# Unit measure [Nm]

Torque: 0.5

# Duration of the torque pulse.
# Unit measure [s]

PulseDuration: 3.0

#---------------------------------------------------------------------------
# Parameter Sweep Configuration
#---------------------------------------------------------------------------

[ParamSweep]

# Set to True to enable parameter sweep for the selected test algorithm.

IsEnabled: False

# Track name used as parameter for the sweep.
# This has to be a valid FW variable.

TrackName: Set_File_Params.IsdrefMax

# Minimum value for the parameter sweep.

MinValue: 2.2

# Maximum value for the parameter sweep.

MaxValue: 2.4

# Number of steps to pass from MinValue to MaxValue.
# This will be the number of the selected test algorithm runs.

Steps: 2

# If True, will apply a conversion formula to the specified MinValue
# and MaxValue before writing them to the variable.

ToBeConverted: True

# Conversion formula to apply to the specified MinValue
# and MaxValue before writing them to the variable.
# This is valid only if ToBeConverted is set to True.

ConversionFormula: x / 8.42 * 32768